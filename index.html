<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <title>Estoque Tecar</title>

  <meta name="theme-color" content="#061521">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Estoque Tecar">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" sizes="180x180" href="https://brunosoarescaminhoes-stack.github.io/tecar-icons/mercedes_star_icon_180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://brunosoarescaminhoes-stack.github.io/tecar-icons/mercedes_star_icon_192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://brunosoarescaminhoes-stack.github.io/tecar-icons/mercedes_star_icon_512.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #061521;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #061521;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #061521;
      color: white;
      font-size: 18px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="loading" id="loading">Carregando Estoque Tecar...</div>

  <iframe
    src="https://script.google.com/macros/s/AKfycbwcatZ5B_w3IDD0WQdyKQjgIqw2arqSp07H9fSMcVBQOa6p2tH2h3n5eXbIkhjUmekWOA/exec"
    onload="document.getElementById('loading').style.display='none';">
  </iframe>
</body>
</html>
